<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <defs>
    <radialGradient id="dome2" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1432"/>
      <stop offset="100%" stop-color="#06060d"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#dome2)"/>
  <!-- arena LED arc -->
  <path d="M20 130 Q160 -10 300 130" fill="none" stroke="#00e5ff" stroke-width="1.5" opacity=".4"/>
  <path d="M20 130 Q160 20 300 130" fill="none" stroke="#ff00c8" stroke-width=".75" opacity=".35"/>
  <!-- seat rows -->
  <g stroke="#2a2a4a" stroke-width="1" fill="none">
    <path d="M30 145 Q160 90 290 145"/>
    <path d="M40 158 Q160 110 280 158"/>
    <path d="M50 170 Q160 128 270 170"/>
    <path d="M60 182 Q160 145 260 182"/>
  </g>
  <!-- people seated dots -->
  <g fill="#5a5a8a">
    <circle cx="60" cy="142" r="3"/><circle cx="85" cy="135" r="3"/><circle cx="110" cy="128" r="3"/>
    <circle cx="135" cy="124" r="3"/><circle cx="185" cy="124" r="3"/><circle cx="210" cy="128" r="3"/>
    <circle cx="235" cy="135" r="3"/><circle cx="260" cy="142" r="3"/>
    <circle cx="70" cy="156" r="3"/><circle cx="95" cy="148" r="3"/><circle cx="120" cy="142" r="3"/>
    <circle cx="200" cy="142" r="3"/><circle cx="225" cy="148" r="3"/><circle cx="250" cy="156" r="3"/>
  </g>
  <!-- patient seat highlight -->
  <circle cx="160" cy="124" r="9" fill="#ff4d6d" opacity=".9"/>
  <circle cx="160" cy="124" r="14" fill="none" stroke="#ff4d6d" stroke-width="1.5" opacity=".7">
    <animate attributeName="r" values="12;20;12" dur="1.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".7;.15;.7" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <!-- companion -->
  <circle cx="148" cy="124" r="4" fill="#00ffa3"/>
  <text x="160" y="48" text-anchor="middle" fill="#00e5ff" font-family="Segoe UI" font-size="9" opacity=".7">SECTION 204 · ROW 12 · SEAT 8</text>
  <text x="160" y="195" text-anchor="middle" fill="#ff4d6d" font-family="Segoe UI" font-size="9" font-weight="bold">⚕  MEDICAL · PRE-SHOW T-12 MIN</text>
</svg>
