<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <defs>
    <radialGradient id="dome4" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#161630"/>
      <stop offset="100%" stop-color="#06060d"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#dome4)"/>
  <!-- stairwell perspective -->
  <g stroke="#00e5ff" stroke-width="1" opacity=".5" fill="none">
    <path d="M40 60 L120 60 L160 80 L200 80 L280 60"/>
    <path d="M40 80 L130 80 L165 100 L200 100 L280 80"/>
    <path d="M40 100 L135 100 L170 120 L200 120 L280 100"/>
    <path d="M40 120 L140 120 L175 140 L200 140 L280 120"/>
    <path d="M40 140 L145 140 L180 160 L200 160 L280 140"/>
  </g>
  <!-- handrail -->
  <line x1="40" y1="50" x2="120" y2="50" stroke="#ff00c8" stroke-width="2" opacity=".7"/>
  <line x1="120" y1="50" x2="200" y2="170" stroke="#ff00c8" stroke-width="2" opacity=".7"/>
  <line x1="200" y1="170" x2="280" y2="170" stroke="#ff00c8" stroke-width="2" opacity=".7"/>
  <!-- spill blob -->
  <ellipse cx="158" cy="110" rx="22" ry="9" fill="#ffb84d" opacity=".75"/>
  <ellipse cx="156" cy="110" rx="14" ry="6" fill="#ffd699" opacity=".9"/>
  <!-- pulsing alert -->
  <circle cx="158" cy="110" r="22" fill="none" stroke="#ffb84d" stroke-width="2">
    <animate attributeName="r" values="20;30;20" dur="1.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".8;.1;.8" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <!-- cup -->
  <rect x="180" y="98" width="6" height="9" fill="#e8e8ff" opacity=".8"/>
  <text x="160" y="22" text-anchor="middle" fill="#00e5ff" font-family="Segoe UI" font-size="9" opacity=".7">CONCOURSE 200 · STAIRWELL S-4</text>
  <text x="160" y="195" text-anchor="middle" fill="#ffb84d" font-family="Segoe UI" font-size="9" font-weight="bold">⚠  SLIP HAZARD · INTERMISSION T-3 MIN</text>
</svg>
