<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <defs>
    <radialGradient id="dome1" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#1a1a3a"/>
      <stop offset="100%" stop-color="#06060d"/>
    </radialGradient>
    <linearGradient id="led1" x1="0" x2="1">
      <stop offset="0" stop-color="#00e5ff"/>
      <stop offset="1" stop-color="#ff00c8"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#dome1)"/>
  <ellipse cx="160" cy="40" rx="140" ry="34" fill="none" stroke="url(#led1)" stroke-width="1.5" opacity=".55"/>
  <ellipse cx="160" cy="40" rx="120" ry="26" fill="none" stroke="#00e5ff" stroke-width=".75" opacity=".35"/>
  <text x="160" y="22" text-anchor="middle" fill="#00e5ff" font-family="Segoe UI" font-size="9" opacity=".7">SECTION 312 · GATE B</text>
  <!-- gate frame -->
  <rect x="130" y="60" width="60" height="80" fill="#0d0d1a" stroke="#ff00c8" stroke-width="1.5"/>
  <text x="160" y="78" text-anchor="middle" fill="#ff00c8" font-family="Segoe UI" font-size="8" font-weight="bold">GATE B</text>
  <!-- crowd dots -->
  <g fill="#e8e8ff">
    <circle cx="40" cy="160" r="5"/><circle cx="55" cy="170" r="5"/><circle cx="70" cy="158" r="5"/>
    <circle cx="85" cy="172" r="5"/><circle cx="100" cy="161" r="5"/><circle cx="115" cy="173" r="5"/>
    <circle cx="130" cy="160" r="5"/><circle cx="145" cy="172" r="5"/><circle cx="155" cy="160" r="5"/>
    <circle cx="165" cy="168" r="5"/><circle cx="175" cy="160" r="5"/><circle cx="185" cy="170" r="5"/>
    <circle cx="195" cy="158" r="5"/><circle cx="208" cy="170" r="5"/><circle cx="222" cy="160" r="5"/>
    <circle cx="48" cy="180" r="5"/><circle cx="65" cy="186" r="5"/><circle cx="82" cy="180" r="5"/>
    <circle cx="100" cy="186" r="5"/><circle cx="118" cy="182" r="5"/><circle cx="135" cy="186" r="5"/>
    <circle cx="152" cy="182" r="5"/><circle cx="170" cy="188" r="5"/><circle cx="188" cy="184" r="5"/>
    <circle cx="205" cy="188" r="5"/><circle cx="220" cy="184" r="5"/>
  </g>
  <!-- alert glow -->
  <circle cx="160" cy="155" r="22" fill="none" stroke="#ff4d6d" stroke-width="2" opacity=".7">
    <animate attributeName="r" values="18;26;18" dur="1.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".7;.2;.7" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <text x="160" y="195" text-anchor="middle" fill="#ff4d6d" font-family="Segoe UI" font-size="9" font-weight="bold">⚠  BOTTLENECK</text>
</svg>
