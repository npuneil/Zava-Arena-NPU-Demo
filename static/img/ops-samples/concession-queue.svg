<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <defs>
    <radialGradient id="dome5" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1a38"/>
      <stop offset="100%" stop-color="#06060d"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#dome5)"/>
  <!-- concourse floor lines -->
  <g stroke="#2a2a4a" stroke-width="1">
    <line x1="0" y1="60" x2="320" y2="60"/>
    <line x1="0" y1="160" x2="320" y2="160"/>
  </g>
  <!-- concession booths -->
  <g>
    <rect x="20" y="30" width="60" height="30" fill="#0d0d1a" stroke="#00e5ff"/>
    <text x="50" y="50" text-anchor="middle" fill="#00e5ff" font-family="Segoe UI" font-size="9" font-weight="bold">BAR W-12</text>
    <rect x="130" y="30" width="60" height="30" fill="#0d0d1a" stroke="#ff4d6d" stroke-width="1.5"/>
    <text x="160" y="50" text-anchor="middle" fill="#ff4d6d" font-family="Segoe UI" font-size="9" font-weight="bold">BAR W-14</text>
    <rect x="240" y="30" width="60" height="30" fill="#0d0d1a" stroke="#00e5ff"/>
    <text x="270" y="50" text-anchor="middle" fill="#00e5ff" font-family="Segoe UI" font-size="9" font-weight="bold">BAR W-16</text>
  </g>
  <!-- short queues -->
  <g fill="#5a8aaa">
    <circle cx="50" cy="75" r="4"/><circle cx="50" cy="86" r="4"/><circle cx="50" cy="97" r="4"/>
    <circle cx="270" cy="75" r="4"/><circle cx="270" cy="86" r="4"/>
  </g>
  <!-- long queue snaking -->
  <g fill="#ff4d6d">
    <circle cx="160" cy="75" r="4"/><circle cx="160" cy="86" r="4"/><circle cx="160" cy="97" r="4"/>
    <circle cx="160" cy="108" r="4"/><circle cx="160" cy="119" r="4"/><circle cx="160" cy="130" r="4"/>
    <circle cx="160" cy="141" r="4"/><circle cx="171" cy="141" r="4"/><circle cx="182" cy="141" r="4"/>
    <circle cx="193" cy="141" r="4"/><circle cx="204" cy="141" r="4"/><circle cx="149" cy="141" r="4"/>
    <circle cx="138" cy="141" r="4"/><circle cx="127" cy="141" r="4"/><circle cx="116" cy="141" r="4"/>
    <circle cx="105" cy="141" r="4"/>
  </g>
  <!-- alert glow -->
  <circle cx="160" cy="120" r="38" fill="none" stroke="#ff4d6d" stroke-width="1.5" opacity=".6">
    <animate attributeName="r" values="32;46;32" dur="1.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".7;.1;.7" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <text x="160" y="22" text-anchor="middle" fill="#00e5ff" font-family="Segoe UI" font-size="9" opacity=".7">CONCOURSE WEST · INTERMISSION</text>
  <text x="160" y="180" text-anchor="middle" fill="#ff4d6d" font-family="Segoe UI" font-size="9" font-weight="bold">QUEUE 16-DEEP · WAIT 14 MIN · SPF</text>
  <text x="160" y="195" text-anchor="middle" fill="#ffb84d" font-family="Segoe UI" font-size="9" font-weight="bold">👥  CROWD FLOW · ACT II IN 8 MIN</text>
</svg>
